<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vértice | Secure Login</title>
    <!-- Fontes Oficiais Vértice -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --primary: #CCFF00;
            --primary-dark: #a3cc00;
            --bg-dark: #050505;
            --bg-card: #111111;
            --bg-hover: #1a1a1a;
            --text-main: #FFFFFF;
            --text-muted: #AAAAAA;
            --border-color: rgba(255, 255, 255, 0.1);
            --danger: #ff3333;

            --font-heading: 'Space Grotesk', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-body);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            background-image: radial-gradient(circle at 50% 0%, rgba(204, 255, 0, 0.05) 0%, transparent 50%);
        }

        .login-container {
            background: rgba(17, 17, 17, 0.8);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 8px;
            width: 100%;
            max-width: 420px;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        /* Top Accent Line */
        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--primary);
        }

        .brand {
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 28px;
            letter-spacing: -0.5px;
            text-align: center;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .brand span {
            color: var(--primary);
        }

        .client-name {
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 14px;
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-main);
            font-size: 14px;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: rgba(204, 255, 0, 0.5);
            box-shadow: 0 0 0 1px rgba(204, 255, 0, 0.2);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: var(--bg-dark);
            border: none;
            border-radius: 4px;
            font-family: var(--font-heading);
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: var(--primary-dark);
        }

        .btn-login:disabled {
            background: #555;
            color: #888;
            cursor: not-allowed;
        }

        .error-msg {
            color: var(--danger);
            font-size: 13px;
            margin-top: 15px;
            display: none;
            background: rgba(255, 51, 51, 0.1);
            border: 1px solid rgba(255, 51, 51, 0.2);
            padding: 10px;
            border-radius: 4px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="brand">VERTICE<span>↗</span></div>
        <div class="client-name">Katuta's Pizzaria (WaaS)</div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Usuário</label>
                <input type="text" id="username" required autocomplete="username" placeholder="Identificação de Acesso">
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••">
            </div>

            <button type="submit" class="btn-login" id="btnSubmit">Autenticar Sistema</button>
            <div id="error" class="error-msg"></div>
        </form>
    </div>

    <!-- Import Auth Logic -->
    <script src="auth.js"></script>
    <script>
        // Oculta warnings globais do ngrok/pinggy se existirem na URL
        if (window.location.search.includes('ngrok-skip-browser-warning')) {
            const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
            window.history.pushState({ path: newUrl }, '', newUrl);
        }

        // Se já estiver logado, redireciona
        if (Auth.getUser()) {
            window.location.href = 'index.html';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('btnSubmit');
            const errorDiv = document.getElementById('error');
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();

            btn.disabled = true;
            btn.innerText = 'Verificando Criptografia...';
            errorDiv.style.display = 'none';

            try {
                const result = await Auth.login(user, pass);
                if (result.success) {
                    btn.innerText = 'Acesso Concedido';
                    btn.style.background = '#4CAF50';
                    btn.style.color = '#fff';
                    setTimeout(() => {
                        window.location.href = 'index.html'; // Removido o /dashboard para não quebrar caminhos relativos na Vercel
                    }, 500);
                } else {
                    errorDiv.innerText = result.message || 'Falha na autenticação';
                    errorDiv.style.display = 'block';
                    btn.disabled = false;
                    btn.innerText = 'Autenticar Sistema';
                }
            } catch (err) {
                errorDiv.innerText = 'Erro de comunicação com o servidor n8n.';
                errorDiv.style.display = 'block';
                btn.disabled = false;
                btn.innerText = 'Autenticar Sistema';
            }
        });
    </script>
</body>

</html>
